<style>
:root{
--bg:#000;
--card:rgba(255,255,255,0.05);
--stroke:rgba(255,255,255,0.12);
--text:#fff;
--muted:rgba(255,255,255,0.72);
--pillColor:#000;
}
*{box-sizing:border-box}
body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
.card,.media-card,.row,.pill,.media-btn,.btn,.tab{
-webkit-tap-highlight-color:transparent;
}
.wrap{max-width:720px;margin:0 auto;padding:20px 16px 100px;}
.top{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 14px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand img{
width:44px;height:44px;border-radius:12px;object-fit:cover;
border:1px solid var(--stroke);background:#000;
}
.brand .name{font-weight:800;font-size:17px;}
.hero{
margin:8px 0 18px;border-radius:18px;border:1px solid var(--stroke);
background:rgba(255,255,255,0.03);overflow:hidden;
}
.hero img{width:100%;display:block;}
.card,.media-card{
border:1px solid var(--stroke);background:var(--card);
border-radius:18px;padding:16px;margin:16px 0;display:flex;flex-direction:column;
animation:fadeIn .35s ease;transition:transform .18s ease, box-shadow .18s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media (hover:hover) and (pointer:fine){
.card:hover,.media-card:hover,.row:hover{
transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.28);
}}
@media (hover:none) and (pointer:coarse){
.card:active,.media-card:active,.row:active{
transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.28);
}}
.h1{font-size:18px;font-weight:800;margin:0 0 6px;}
.p{margin:0;color:var(--muted);font-size:13px;}
.hidden{display:none!important}
.row{
display:flex;align-items:center;justify-content:space-between;gap:14px;
border:1px solid var(--stroke);background:rgba(255,255,255,0.04);
border-radius:16px;padding:14px;margin:14px 0;text-decoration:none;color:inherit;
transition:background .15s ease, transform .18s ease, box-shadow .18s ease;
}
.row:hover{background:rgba(255,255,255,0.06);}
.left{display:flex;flex-direction:column;gap:4px;}
.label{font-weight:700;font-size:14px;}
.hint{color:var(--muted);font-size:12px;}
.pill,.media-btn{
height:34px;display:inline-flex;align-items:center;justify-content:center;
padding:0 16px;border-radius:999px;background:var(--pillColor);
color:#fff;font-size:13px;font-weight:600;text-decoration:none;
transition:transform .07s ease, opacity .12s ease;
}
.btn{
display:inline-flex;align-items:center;justify-content:center;
width:100%;height:42px;border-radius:999px;border:none;
background:var(--pillColor);color:#fff;font-weight:700;text-decoration:none;
cursor:pointer;margin-top:12px;transition:transform .07s ease, opacity .12s ease;
}
.btn:active,.pill:active,.media-btn:active{transform:scale(.95);opacity:.9;}
.section-title{font-weight:700;font-size:16px;margin:20px 4px 12px;}
.media-thumb{
width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;margin-bottom:12px;
border:1px solid var(--stroke);background:rgba(255,255,255,0.04);
}
.media-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.media-title{font-weight:700;font-size:15px;margin-bottom:4px;}
.media-desc{font-size:13px;color:var(--muted);margin-bottom:12px;}
.media-btn{margin-left:auto;}
.media-locked{opacity:.6;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);}
.tabs{
position:fixed;left:0;right:0;bottom:0;background:rgba(0,0,0,0.88);
backdrop-filter:blur(12px);border-top:1px solid var(--stroke);padding:10px 12px;
}
.tabrow{max-width:720px;margin:0 auto;display:flex;gap:10px;}
.tab{
flex:1;border:1px solid var(--stroke);background:rgba(255,255,255,0.05);
color:var(--muted);padding:10px;border-radius:14px;font-size:13px;text-align:center;
cursor:pointer;transition:background .15s ease,color .15s ease;
}
.tab.active{
color:var(--text);background:rgba(255,255,255,0.12);
box-shadow:0 0 0 1px rgba(255,255,255,0.08) inset;
}
section{transition:opacity .18s ease, transform .18s ease;}
section.hidden{opacity:0;transform:translateY(8px);pointer-events:none;}
</style>

<meta name="apple-mobile-web-app-title" content="DJ TEST 21">
<meta name="application-name" content="DJ TEST 21">

</head>

<body>

<div class="wrap">

<div class="top">
  <div class="brand">
    <img id="logo" src="icons/icon-192-v8.png">
    <div class="name" id="name">Creator</div>
  </div>
</div>

<div class="hero">
  <img id="heroImg" src="icons/icon-512-v8.png">
</div>

<section id="view-home">
  <div class="card">
    <div class="h1">Home</div>
    <p class="p" id="bio"></p>
    <div id="connectMount"></div>
  </div>
</section>

<section id="view-media" class="hidden">
  <div id="mediaSection"></div>
</section>

<section id="view-links" class="hidden">
  <div class="card">
    <div id="links"></div>
  </div>
</section>

</div>

<nav class="tabs">
  <div class="tabrow">
    <div class="tab active" data-id="home">Home</div>
    <div class="tab" data-id="media">Media</div>
    <div class="tab" data-id="links">Links</div>
  </div>
</nav>
