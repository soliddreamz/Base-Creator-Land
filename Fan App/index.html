<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>DJ TEST 21</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icons/icon-192-v8.png">

<style>

:root{
--bg:#000;
--card:rgba(255,255,255,0.05);
--stroke:rgba(255,255,255,0.12);
--text:#fff;
--muted:rgba(255,255,255,0.72);
--pillColor:#000;
}

*{box-sizing:border-box}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

.wrap{
max-width:720px;
margin:0 auto;
padding:20px 16px 100px;
}

.top{
display:flex;
align-items:center;
justify-content:space-between;
padding:6px 2px 14px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.brand img{
width:44px;
height:44px;
border-radius:12px;
object-fit:cover;
border:1px solid var(--stroke);
background:#000;
}

.brand .name{
font-weight:800;
font-size:17px;
}

.hero{
margin:8px 0 18px;
border-radius:18px;
border:1px solid var(--stroke);
background:rgba(255,255,255,0.03);
overflow:hidden;
}

.hero img{
width:100%;
display:block;
}

.card{
border:1px solid var(--stroke);
background:var(--card);
border-radius:18px;
padding:16px;
margin:16px 0;
}

.h1{
font-size:18px;
font-weight:800;
margin:0 0 6px;
}

.p{
margin:0;
color:var(--muted);
font-size:13px;
}

.hidden{display:none!important}

/* LINKS */

.row{
display:flex;
align-items:center;
justify-content:space-between;
gap:14px;
border:1px solid var(--stroke);
background:rgba(255,255,255,0.04);
border-radius:16px;
padding:14px;
margin:14px 0;
text-decoration:none;
color:inherit;
}

.left{
display:flex;
flex-direction:column;
gap:4px;
}

.label{
font-weight:700;
font-size:14px;
}

.hint{
color:var(--muted);
font-size:12px;
}

.pill{
flex:0 0 auto;
padding:8px 16px;
border-radius:999px;
background:var(--pillColor);
color:#fff;
font-size:12px;
font-weight:600;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
width:100%;
padding:12px 14px;
border-radius:999px;
border:none;
background:var(--pillColor);
color:#fff;
font-weight:700;
text-decoration:none;
cursor:pointer;
margin-top:12px;
}

/* MEDIA */

.section-title{
font-weight:700;
font-size:16px;
margin:20px 4px 12px;
}

/* FIXED: unified card system */

.media-card{
border:1px solid var(--stroke);
background:var(--card);
border-radius:18px;
padding:16px;
margin:18px 0;
}

.media-thumb{
width:100%;
aspect-ratio:16/9;
border-radius:10px;
overflow:hidden;
margin-bottom:12px;
border:1px solid var(--stroke);
background:rgba(255,255,255,0.04);
}

.media-thumb img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.media-title{
font-weight:700;
font-size:15px;
margin-bottom:4px;
}

.media-desc{
font-size:13px;
color:var(--muted);
margin-bottom:12px;
}

.media-btn{
display:inline-block;
padding:8px 16px;
border-radius:999px;
background:var(--pillColor);
color:#fff;
font-size:13px;
text-decoration:none;
font-weight:600;
}

.media-locked{
opacity:0.6;
}

/* TABS */

.tabs{
position:fixed;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.88);
backdrop-filter:blur(12px);
border-top:1px solid var(--stroke);
padding:10px 12px;
}

.tabrow{
max-width:720px;
margin:0 auto;
display:flex;
gap:10px;
}

.tab{
flex:1;
border:1px solid var(--stroke);
background:rgba(255,255,255,0.05);
color:var(--muted);
padding:10px;
border-radius:14px;
font-size:13px;
text-align:center;
cursor:pointer;
}

.tab.active{
color:var(--text);
background:rgba(255,255,255,0.10);
}

</style>

<meta name="apple-mobile-web-app-title" content="DJ TEST 21">
<meta name="application-name" content="DJ TEST 21">
<link rel="icon" href="icons/icon-192-v8.png">

</head>

<body>

<div class="wrap">

<div class="top">
<div class="brand">
<img id="logo" src="icons/icon-192-v8.png">
<div class="name" id="name">Creator</div>
</div>
</div>

<div class="hero">
<img id="heroImg" src="icons/icon-512.png">
</div>

<section id="view-home">
<div class="card">
<div class="h1">Home</div>
<p class="p" id="bio"></p>
<div id="connectMount"></div>
</div>
</section>

<section id="view-media" class="hidden">
<div id="mediaSection"></div>
</section>

<section id="view-links" class="hidden">
<div class="card">
<div id="links"></div>
</div>
</section>

</div>

<nav class="tabs">
<div class="tabrow">
<div class="tab active" data-id="home">Home</div>
<div class="tab" data-id="media">Media</div>
<div class="tab" data-id="links">Links</div>
</div>
</nav>

<script>

/* ORIGINAL JS UNCHANGED */

const CONTENT_URL="./content.json"
const POLL_INTERVAL=15000

let previewMode=false

function safeURL(url){

if(!url) return ""

try{

const u=new URL(url)

if(u.protocol==="http:"||u.protocol==="https:"||u.protocol==="mailto:")
return u.href

}catch(e){}

return ""

}

function normalizeURL(url){

if(!url) return ""

if(url.includes("dropbox.com")){
url=url
.replace("www.dropbox.com","dl.dropboxusercontent.com")
.replace("?dl=0","")
.replace("&dl=0","")
}

if(url.includes("drive.google.com")){
url=url.replace("/view","/preview")
}

return url

}

const views={
home:document.getElementById("view-home"),
media:document.getElementById("view-media"),
links:document.getElementById("view-links")
}

document.querySelectorAll(".tab").forEach(t=>{
t.onclick=()=>setView(t.dataset.id)
})

function setView(id){
Object.keys(views).forEach(k=>views[k].classList.toggle("hidden",k!==id))
document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.id===id))
}

function applyState(d){

if(!d)return

document.getElementById("name").textContent=d.name||""
document.getElementById("bio").textContent=d.bio||""

document.documentElement.style.setProperty('--pillColor',d.pillColor||"#000")

if(d.backgroundColor){
document.body.style.background=d.backgroundColor
}

const connectMount=document.getElementById("connectMount")
connectMount.innerHTML=""

if(d.contactEmail){

const label=d.contactLabel||"Connect"

const a=document.createElement("a")
a.className="btn"
a.href=`mailto:${d.contactEmail}`
a.textContent=label

connectMount.appendChild(a)

}

renderMedia(d)
renderLinks(d)

}

function renderLinks(d){

const container=document.getElementById("links")
container.innerHTML=""

const links=Array.isArray(d.links)?d.links:[]

links.forEach(item=>{

const url=safeURL(item.url)

if(!url)return

const a=document.createElement("a")
a.className="row"
a.href=url
a.target="_blank"
a.rel="noopener"

const left=document.createElement("div")
left.className="left"

const label=document.createElement("div")
label.className="label"
label.textContent=item.label||"Link"

const hint=document.createElement("div")
hint.className="hint"
hint.textContent=url.replace(/^https?:\/\//,"")

left.appendChild(label)
left.appendChild(hint)

const pill=document.createElement("div")
pill.className="pill"
pill.textContent="Open"

a.appendChild(left)
a.appendChild(pill)

container.appendChild(a)

})

}

function renderMedia(d){

const container=document.getElementById("mediaSection")
container.innerHTML=""

if(!d.mediaGateway||!d.mediaGateway.enabled)return

const collections=d.mediaGateway.collections||[]

collections.forEach(collection=>{

const title=document.createElement("div")
title.className="section-title"
title.textContent=collection.title

container.appendChild(title)

collection.items.forEach(item=>{

const card=document.createElement("div")
card.className="media-card"

if(item.thumbnail){

const thumb=document.createElement("div")
thumb.className="media-thumb"

const img=document.createElement("img")

img.src=normalizeURL(item.thumbnail)

img.onload=()=>{
thumb.appendChild(img)
card.insertBefore(thumb,card.firstChild)
}

}

const t=document.createElement("div")
t.className="media-title"
t.textContent=item.title||""

card.appendChild(t)

if(item.description){

const desc=document.createElement("div")
desc.className="media-desc"
desc.textContent=item.description

card.appendChild(desc)

}

if(item.access==="public"&&item.url){

const btn=document.createElement("a")
btn.className="media-btn"
btn.href=safeURL(item.url)
btn.target="_blank"
btn.rel="noopener"
btn.textContent="Open"

card.appendChild(btn)

}else{

const locked=document.createElement("div")
locked.className="media-btn media-locked"
locked.textContent="Locked"

card.appendChild(locked)

}

container.appendChild(card)

})

})

}

async function fetchState(){

if(previewMode) return

const url=new URL(CONTENT_URL,location.href)
url.searchParams.set("ts",Date.now())

const res=await fetch(url.toString(),{cache:"no-store"})
return res.json()

}

let polling=true

async function tick(){

if(!polling || previewMode) return

try{

const state=await fetchState()
applyState(state)

}catch(e){}

}

document.addEventListener("visibilitychange",()=>{

polling=!document.hidden

})

window.addEventListener("message",(event)=>{

const msg=event.data

if(!msg) return

if(msg.type==="BASE_PREVIEW"){

previewMode=true
applyState(msg.payload)

}

})

tick()

setInterval(tick,POLL_INTERVAL)

</script>

</body>
</html>
