<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BASE Creator Dashboard</title>

<style>
html, body{
margin:0;
padding:0;
background:#000;
color:#fff;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
min-height:100%;
}

.wrap{
max-width:1080px;
margin:0 auto;
padding:18px 14px 40px;
box-sizing:border-box;
}

.top{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:16px;
margin-bottom:14px;
}

h1{
font-size:34px;
margin:0 0 6px 0;
letter-spacing:.2px;
}

.sub{
opacity:.72;
margin:0;
font-size:16px;
}

.pill{
border:2px solid #caa300;
border-radius:999px;
padding:10px 14px;
font-weight:600;
min-width:160px;
text-align:center;
}

.pill.ok{border-color:#2ee06b}
.pill.bad{border-color:#ff4b4b}
.pill.warn{border-color:#caa300}

.card{
border:1px solid #222;
background:#070707;
border-radius:18px;
padding:18px;
margin:18px 0;
box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
}

.row{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.col{
flex:1;
min-width:240px;
}

label{
display:block;
font-size:13px;
opacity:.75;
margin-bottom:6px;
}

input,textarea,button,select{
font:inherit;
}

input,textarea,select{
width:100%;
box-sizing:border-box;
border-radius:14px;
border:1px solid #2a2a2a;
background:#000;
color:#fff;
padding:12px;
outline:none;
}

textarea{
min-height:120px;
resize:vertical;
}

input[type=color]{
height:52px;
padding:6px;
cursor:pointer;
}

.btnRow{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:12px;
}

button{
border-radius:14px;
border:1px solid #2a2a2a;
background:#0b0b0b;
color:#fff;
padding:12px 16px;
cursor:pointer;
}

button:hover{border-color:#444}
button:disabled{opacity:.5;cursor:not-allowed}

.primary{border-color:#caa300!important}
.danger{border-color:#5a1b1b!important}

.linksList{margin-top:10px}

.linkRow{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
padding:10px 12px;
border:1px solid #222;
border-radius:14px;
margin-top:10px;
background:#050505;
}

.linkText{
opacity:.92;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
max-width:calc(100% - 110px);
}

.tiny{
font-size:12px;
opacity:.65;
margin-top:6px;
}

.statusBox{
white-space:pre-wrap;
font-size:12px;
opacity:.75;
}

.previewFrame{
display:block;
width:100%;
height:720px;
border:0;
background:#000;
}
</style>
</head>

<body>

<div class="wrap">

<div class="top">
<div>
<h1>BASE Creator Dashboard</h1>
<p class="sub">Load current state first, then edit, preview, and publish.</p>
</div>
<div id="statePill" class="pill warn">STATUS: ready</div>
</div>

<div class="card">

<div class="row">
<div class="col">
<label>Creator Key</label>
<input id="token" type="password">
</div>

<div class="col">
<label>content.json URL</label>
<input id="contentUrl">
</div>
</div>

<div class="btnRow">
<button id="btnLoad" class="primary">Load Current State</button>
</div>

<div class="tiny" id="lastSha">sha: —</div>

</div>

<div class="card">

<div class="row">
<div class="col">
<label>Name</label>
<input id="name">
</div>

<div class="col">
<label>Bio</label>
<input id="bio">
</div>
</div>

<div style="margin-top:14px;">
<label>Background Color</label>
<input id="backgroundColor" type="color">
</div>

<div style="margin-top:14px;">
<label>Pill Color</label>
<input id="pillColor" type="color">
</div>

</div>

<div class="card">

<h3>Links</h3>

<div class="row">
<div class="col">
<label>Label</label>
<input id="linkLabelInput">
</div>

<div class="col">
<label>URL</label>
<input id="linkUrlInput">
</div>
</div>

<div class="btnRow">
<button id="addLinkBtn">Add Link</button>
<button id="clearLinksBtn" class="danger">Clear Links</button>
</div>

<div id="linksList" class="linksList"></div>

</div>

<div class="card">

<h3>Fan App Preview</h3>

<iframe
id="fanPreviewFrame"
class="previewFrame"
src="../Fan App/index.html?basePreviewShell=1">
</iframe>

</div>

<div class="card">

<div style="display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;">

<div>
<div>Repo: <span id="repoLabel"></span></div>
<div class="tiny">Target: Fan App/content.json</div>
</div>

<div style="display:flex;gap:12px;flex-wrap:wrap;">
<button id="btnPublish" disabled>Publish</button>
<button id="btnResetToken" class="danger">Reset Key</button>
</div>

</div>

</div>

<div class="card">
<h3>Status</h3>
<div id="status" class="statusBox"></div>
</div>

</div>

<script>

const OWNER="soliddreamz"
const REPO="Base-Creator-Land"
const BRANCH="main"

const TARGET_PATH="Fan App/content.json"

const DEFAULT_CONTENT_URL=`https://${OWNER}.github.io/${REPO}/Fan%20App/content.json`

const LS_TOKEN="base_creator_token_v1"

const $=id=>document.getElementById(id)

const el={
token:$("token"),
contentUrl:$("contentUrl"),
btnLoad:$("btnLoad"),
btnPublish:$("btnPublish"),
btnResetToken:$("btnResetToken"),
name:$("name"),
bio:$("bio"),
backgroundColor:$("backgroundColor"),
pillColor:$("pillColor"),
linkLabelInput:$("linkLabelInput"),
linkUrlInput:$("linkUrlInput"),
addLinkBtn:$("addLinkBtn"),
clearLinksBtn:$("clearLinksBtn"),
linksList:$("linksList"),
status:$("status"),
repoLabel:$("repoLabel"),
statePill:$("statePill"),
lastSha:$("lastSha"),
previewFrame:$("fanPreviewFrame")
}

let hasLoadedState=false
let linkState=[]

function ghEncodePath(path){
return path.split("/").map(encodeURIComponent).join("/")
}

function ghHeaders(token){
return{
Accept:"application/vnd.github+json",
Authorization:`Bearer ${token.trim()}`,
"X-GitHub-Api-Version":"2022-11-28",
"Content-Type":"application/json"
}
}

function init(){

el.repoLabel.textContent=`${OWNER}/${REPO}@${BRANCH}`
el.contentUrl.value=DEFAULT_CONTENT_URL

const saved=localStorage.getItem(LS_TOKEN)

if(saved){
el.token.value=saved
}

}

el.token.addEventListener("input",()=>{
const t=(el.token.value||"").trim()

if(t){
localStorage.setItem(LS_TOKEN,t)
}else{
localStorage.removeItem(LS_TOKEN)
}

})

init()

</script>

</body>
</html>
