<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BASE Creator Dashboard</title>

<style>
html, body{
margin:0;
padding:0;
background:#000;
color:#fff;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
min-height:100%;
}

.wrap{
max-width:1080px;
margin:0 auto;
padding:18px 14px 40px;
box-sizing:border-box;
}

.top{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:16px;
margin-bottom:14px;
}

h1{
font-size:34px;
margin:0 0 6px 0;
letter-spacing:.2px;
}

.sub{
opacity:.72;
margin:0;
font-size:16px;
}

.pill{
border:2px solid #caa300;
border-radius:999px;
padding:10px 14px;
font-weight:600;
min-width:160px;
text-align:center;
}

.pill.ok{border-color:#2ee06b}
.pill.bad{border-color:#ff4b4b}
.pill.warn{border-color:#caa300}

.card{
border:1px solid #222;
background:#070707;
border-radius:18px;
padding:18px;
margin:18px 0;
box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
}

.row{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.col{
flex:1;
min-width:240px;
}

label{
display:block;
font-size:13px;
opacity:.75;
margin-bottom:6px;
}

input,textarea,button,select{
font:inherit;
}

input,textarea,select{
width:100%;
box-sizing:border-box;
border-radius:14px;
border:1px solid #2a2a2a;
background:#000;
color:#fff;
padding:12px;
outline:none;
}

textarea{
min-height:120px;
resize:vertical;
}

input[type=color]{
height:52px;
padding:6px;
cursor:pointer;
}

.btnRow{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:12px;
}

button{
border-radius:14px;
border:1px solid #2a2a2a;
background:#0b0b0b;
color:#fff;
padding:12px 16px;
cursor:pointer;
}

button:hover{border-color:#444}
button:disabled{opacity:.5;cursor:not-allowed}

.primary{border-color:#caa300!important}
.danger{border-color:#5a1b1b!important}

.linksList{margin-top:10px}

.linkRow{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
padding:10px 12px;
border:1px solid #222;
border-radius:14px;
margin-top:10px;
background:#050505;
}

.linkText{
opacity:.92;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
max-width:calc(100% - 110px);
}

.tiny{
font-size:12px;
opacity:.65;
margin-top:6px;
}

.statusBox{
white-space:pre-wrap;
font-size:12px;
opacity:.75;
}

.previewFrame{
display:block;
width:100%;
height:720px;
border:0;
background:#000;
}

.miniPreview{
border:1px solid #222;
border-radius:18px;
padding:16px;
background:#040404;
}

.toggleRow{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
flex-wrap:wrap;
}

.mediaList{
margin-top:12px;
}

.mediaItemRow{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:12px;
padding:12px;
border:1px solid #222;
border-radius:14px;
margin-top:10px;
background:#050505;
}

.mediaMeta{
flex:1;
min-width:0;
}

.mediaTitle{
font-weight:700;
margin-bottom:4px;
}

.mediaSub{
opacity:.8;
font-size:12px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}
</style>
</head>

<body>

<div class="wrap">

<div class="top">
<div>
<h1>BASE Creator Dashboard</h1>
<p class="sub">Load current state first, then edit, preview, and publish.</p>
</div>
<div id="statePill" class="pill warn">STATUS: ready</div>
</div>

<div class="card">

<div class="row">
<div class="col">
<label>Creator Key</label>
<input id="token" type="password">
</div>

<div class="col">
<label>content.json URL</label>
<input id="contentUrl">
</div>
</div>

<div class="btnRow">
<button id="btnLoad" class="primary">Load Current State</button>
</div>

<div class="tiny" id="lastSha">sha: —</div>

</div>

<div class="card">

<div class="row">
<div class="col">
<label>Name</label>
<input id="name">
</div>

<div class="col">
<label>Bio</label>
<input id="bio">
</div>
</div>

<div style="margin-top:14px;">
<label>Background Color</label>
<input id="backgroundColor" type="color">
</div>

<div style="margin-top:14px;">
<label>Pill Color</label>
<input id="pillColor" type="color">
</div>

</div>

<div class="card">

<h3>Links</h3>

<div class="row">
<div class="col">
<label>Label</label>
<input id="linkLabelInput">
</div>

<div class="col">
<label>URL</label>
<input id="linkUrlInput">
</div>
</div>

<div class="btnRow">
<button id="addLinkBtn">Add Link</button>
<button id="clearLinksBtn" class="danger">Clear Links</button>
</div>

<div id="linksList" class="linksList"></div>

</div>

<div class="card">

<h3>Media Gateway</h3>

<div class="toggleRow">
<div class="tiny">Controls what fans can access from the Media tab.</div>
<label style="display:flex;align-items:center;gap:10px;margin:0;">
<span class="tiny">Enabled</span>
<input id="mediaEnabled" type="checkbox" style="width:auto;height:auto;">
</label>
</div>

<div class="row" style="margin-top:12px;">
<div class="col">
<label>Collection Title</label>
<input id="mediaCollectionTitle" type="text" placeholder="Latest">
<div class="tiny">V1: one collection.</div>
</div>
</div>

<div class="row" style="margin-top:12px;">
<div class="col">
<label>Item Title</label>
<input id="mediaTitle" type="text" placeholder="Clip title">
</div>
<div class="col">
<label>Access</label>
<select id="mediaAccess">
<option value="public">public</option>
<option value="paid">paid</option>
</select>
</div>
</div>

<div class="row" style="margin-top:12px;">
<div class="col">
<label>URL (public only)</label>
<input id="mediaUrl" type="text" placeholder="https://...">
<div class="tiny">If access=paid, URL is saved empty.</div>
</div>
</div>

<div class="row" style="margin-top:12px;">
<div class="col">
<label>Thumbnail URL (optional)</label>
<input id="mediaThumb" type="text" placeholder="https://.../thumb.jpg">
</div>
</div>

<div class="row" style="margin-top:12px;">
<div class="col">
<label>Description (optional)</label>
<input id="mediaDesc" type="text" placeholder="Short description">
</div>
</div>

<div class="btnRow">
<button id="btnAddMedia">Add Item</button>
<button id="btnClearMedia" class="danger">Clear Media</button>
</div>

<div id="mediaList" class="mediaList"></div>

</div>

<div class="card">

<h3>Fan App Preview</h3>

<iframe
id="fanPreviewFrame"
class="previewFrame"
src="../Fan App/index.html?basePreviewShell=1">
</iframe>

<div style="margin-top:16px">

<div id="miniPreview" class="miniPreview">

<div id="pName" style="font-size:20px;font-weight:700;margin-bottom:8px">—</div>

<div id="pBio" style="opacity:.85;margin-bottom:12px">—</div>

<div id="pLinks"></div>

</div>

</div>

</div>

<div class="card">

<div style="display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;">

<div>
<div>Repo: <span id="repoLabel"></span></div>
<div class="tiny">Target: Fan App/content.json</div>
</div>

<div style="display:flex;gap:12px;flex-wrap:wrap;">
<button id="btnPublish" disabled>Publish</button>
<button id="btnResetToken" class="danger">Reset Key</button>
</div>

</div>

</div>

<div class="card">
<h3>Status</h3>
<div id="status" class="statusBox"></div>
</div>

</div>

<script>

const OWNER="soliddreamz"
const REPO="Base-Creator-Land"
const BRANCH="main"

const TARGET_PATH="Fan App/content.json"
const DEFAULT_CONTENT_URL=`https://${OWNER}.github.io/${REPO}/Fan%20App/content.json`
const LS_TOKEN="base_creator_token_v1"

const $=id=>document.getElementById(id)

const el={
token:$("token"),
contentUrl:$("contentUrl"),
btnLoad:$("btnLoad"),
btnPublish:$("btnPublish"),
btnResetToken:$("btnResetToken"),
name:$("name"),
bio:$("bio"),
backgroundColor:$("backgroundColor"),
pillColor:$("pillColor"),
linkLabelInput:$("linkLabelInput"),
linkUrlInput:$("linkUrlInput"),
addLinkBtn:$("addLinkBtn"),
clearLinksBtn:$("clearLinksBtn"),
linksList:$("linksList"),
mediaEnabled:$("mediaEnabled"),
mediaCollectionTitle:$("mediaCollectionTitle"),
mediaTitle:$("mediaTitle"),
mediaAccess:$("mediaAccess"),
mediaUrl:$("mediaUrl"),
mediaThumb:$("mediaThumb"),
mediaDesc:$("mediaDesc"),
btnAddMedia:$("btnAddMedia"),
btnClearMedia:$("btnClearMedia"),
mediaList:$("mediaList"),
status:$("status"),
repoLabel:$("repoLabel"),
statePill:$("statePill"),
lastSha:$("lastSha"),
previewFrame:$("fanPreviewFrame"),
previewName:$("pName"),
previewBio:$("pBio"),
previewLinks:$("pLinks"),
miniPreview:$("miniPreview")
}

let hasLoadedState=false
let linkState=[]
let mediaItems=[]
let mediaHydrated=false
let mediaTouched=false
let isPublishing=false
const defaultPublishLabel="Publish"

function log(t){
const s=new Date().toLocaleString()
el.status.textContent=`[${s}] ${t}\n`+el.status.textContent
}

function setPill(type,text){
el.statePill.className=`pill ${type}`
el.statePill.textContent=text
}

function ghEncodePath(path){
return path.split("/").map(encodeURIComponent).join("/")
}

function ghHeaders(token){
return{
Accept:"application/vnd.github+json",
Authorization:`Bearer ${String(token||"").trim()}`,
"X-GitHub-Api-Version":"2022-11-28",
"Content-Type":"application/json"
}
}

function toBase64Utf8(str){
const utf8=new TextEncoder().encode(str)
let bin=""
utf8.forEach(b=>bin+=String.fromCharCode(b))
return btoa(bin)
}

function fromBase64Utf8(b64){
const bytes=Uint8Array.from(atob(b64.replace(/\s/g,"")),c=>c.charCodeAt(0))
return new TextDecoder().decode(bytes)
}

function enablePublishIfReady(){
const hasToken=(el.token.value||"").trim().length>0
el.btnPublish.disabled=!!isPublishing || !(hasLoadedState && hasToken)
refreshPreview()
}

function setPublishBusy(busy){
isPublishing=busy===true
el.btnPublish.textContent=isPublishing ? "Publishing..." : defaultPublishLabel
enablePublishIfReady()
}

async function fetchState(){
const raw=(el.contentUrl.value||DEFAULT_CONTENT_URL).trim() || DEFAULT_CONTENT_URL
const url=new URL(raw)
url.searchParams.set("ts",Date.now())
const res=await fetch(url.toString(),{cache:"no-store"})
if(!res.ok) throw new Error(`content.json load failed (${res.status})`)
return res.json()
}

function renderLinks(){

el.linksList.innerHTML=""
el.previewLinks.innerHTML=""

linkState.forEach((l,i)=>{

const row=document.createElement("div")
row.className="linkRow"

const text=document.createElement("div")
text.className="linkText"
text.textContent=`${l.label} — ${l.url}`

const remove=document.createElement("button")
remove.textContent="Remove"

remove.onclick=()=>{
linkState.splice(i,1)
renderLinks()
enablePublishIfReady()
}

row.appendChild(text)
row.appendChild(remove)

el.linksList.appendChild(row)

const p=document.createElement("div")
p.textContent=l.label
el.previewLinks.appendChild(p)

})

}

function renderMediaList(){

el.mediaList.innerHTML=""

const meta=document.createElement("div")
meta.className="tiny"
meta.textContent=`Items: ${mediaItems.length}`
el.mediaList.appendChild(meta)

mediaItems.forEach((item,i)=>{

const row=document.createElement("div")
row.className="mediaItemRow"

const left=document.createElement("div")
left.className="mediaMeta"

const t=document.createElement("div")
t.className="mediaTitle"
t.textContent=item.title||"(untitled)"

const sub=document.createElement("div")
sub.className="mediaSub"
sub.textContent=`${item.access||"public"} — ${item.url ? item.url : "(no url)"}`

left.appendChild(t)
left.appendChild(sub)

const remove=document.createElement("button")
remove.textContent="Remove"

remove.onclick=()=>{
mediaItems.splice(i,1)
mediaTouched=true
renderMediaList()
enablePublishIfReady()
}

row.appendChild(left)
row.appendChild(remove)

el.mediaList.appendChild(row)

})

}

function hydrateMediaGateway(state){

const mg=state && typeof state==="object" ? state.mediaGateway : null

mediaHydrated=true

if(!mg || typeof mg!=="object"){
el.mediaEnabled.checked=false
el.mediaCollectionTitle.value="Latest"
mediaItems=[]
renderMediaList()
return
}

el.mediaEnabled.checked=mg.enabled===true

const collections=Array.isArray(mg.collections)?mg.collections:[]
const first=(collections[0] && typeof collections[0]==="object") ? collections[0] : {}

el.mediaCollectionTitle.value=String(first.title || "Latest")

const items=Array.isArray(first.items) ? first.items : []

mediaItems=items.map(x=>({
id:x?.id || `item-${Math.random().toString(16).slice(2)}`,
title:String(x?.title || ""),
description:String(x?.description || ""),
thumbnail:String(x?.thumbnail || ""),
url:String(x?.url || ""),
access:x?.access==="paid" ? "paid" : "public"
}))

renderMediaList()

}

function buildMediaGateway(){
if(!(mediaHydrated || mediaTouched)) return null

const title=(el.mediaCollectionTitle.value||"Latest").trim() || "Latest"

const items=mediaItems.map(it=>({
id:it.id || `item-${Math.random().toString(16).slice(2)}`,
title:(it.title||"").trim(),
description:(it.description||"").trim(),
thumbnail:(it.thumbnail||"").trim(),
url:it.access==="paid" ? "" : (it.url||"").trim(),
access:it.access==="paid" ? "paid" : "public"
}))

return{
enabled:el.mediaEnabled.checked===true,
collections:[{title,items}]
}

}

function refreshPreview(){

el.previewName.textContent=el.name.value||"—"
el.previewBio.textContent=el.bio.value||"—"

if(el.miniPreview){
el.miniPreview.style.background=el.backgroundColor.value||"#040404"
}

try{
const payload={
name:el.name.value,
bio:el.bio.value,
links:linkState,
backgroundColor:el.backgroundColor.value,
pillColor:el.pillColor.value
}

const mg=buildMediaGateway()
if(mg) payload.mediaGateway=mg

el.previewFrame.contentWindow.postMessage({
type:"BASE_PREVIEW",
payload
},"*")
}catch(e){}

}

async function ghGetFileMeta(token,path){

const api=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${ghEncodePath(path)}?ref=${BRANCH}`

const res=await fetch(api,{headers:ghHeaders(token)})

if(!res.ok)throw new Error(`GitHub GET failed (${res.status})`)

return res.json()

}

async function ghPutFile(token,path,sha,contentBase64,message){

const api=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${ghEncodePath(path)}`

const body={
message,
content:contentBase64,
branch:BRANCH
}

if(sha)body.sha=sha

const res=await fetch(api,{
method:"PUT",
headers:ghHeaders(token),
body:JSON.stringify(body)
})

if(!res.ok)throw new Error(`GitHub PUT failed (${res.status})`)

return res.json()

}

el.addLinkBtn.onclick=()=>{
const label=(el.linkLabelInput.value||"").trim()
const url=(el.linkUrlInput.value||"").trim()

if(!url)return

linkState.push({label:label||url,url})

el.linkLabelInput.value=""
el.linkUrlInput.value=""

renderLinks()
enablePublishIfReady()
}

el.clearLinksBtn.onclick=()=>{
linkState=[]
renderLinks()
enablePublishIfReady()
}

el.btnAddMedia.onclick=()=>{
const title=(el.mediaTitle.value||"").trim()
const access=el.mediaAccess.value==="paid" ? "paid" : "public"
const url=(el.mediaUrl.value||"").trim()
const thumbnail=(el.mediaThumb.value||"").trim()
const description=(el.mediaDesc.value||"").trim()

if(!title)return

mediaItems.push({
id:`item-${Date.now()}-${Math.random().toString(16).slice(2)}`,
title,
description,
thumbnail,
url:access==="paid" ? "" : url,
access
})

mediaTouched=true

el.mediaTitle.value=""
el.mediaUrl.value=""
el.mediaThumb.value=""
el.mediaDesc.value=""

renderMediaList()
enablePublishIfReady()
}

el.btnClearMedia.onclick=()=>{
mediaItems=[]
mediaTouched=true
renderMediaList()
enablePublishIfReady()
}

el.btnLoad.onclick=async()=>{

try{

setPill("warn","STATUS: loading…")

const state=await fetchState()

el.name.value=state.name||""
el.bio.value=state.bio||""
el.backgroundColor.value=state.backgroundColor||"#000000"
el.pillColor.value=state.pillColor||"#caa300"
linkState=Array.isArray(state.links)?state.links:[]
hydrateMediaGateway(state)

renderLinks()

hasLoadedState=true

enablePublishIfReady()

setPill("warn","STATUS: loaded")
log("Loaded current state.")

}catch(e){

setPill("bad","STATUS: load failed")
log(e.message)

}

}

el.btnPublish.onclick=async()=>{

if(isPublishing){
log("Publish blocked: publish already in progress.")
return
}

const token=(el.token.value||"").trim()

if(!token){
setPill("bad","STATUS: token required")
log("Publish blocked: missing creator key.")
enablePublishIfReady()
return
}

try{

setPublishBusy(true)
setPill("warn","STATUS: publishing…")
log("Publish started.")

const meta=await ghGetFileMeta(token,TARGET_PATH)

let existing={}
try{
existing=JSON.parse(fromBase64Utf8(meta.content))
}catch(e){
existing={}
}

const merged={
...existing,
name:el.name.value.trim(),
bio:el.bio.value.trim(),
links:linkState,
backgroundColor:el.backgroundColor.value,
pillColor:el.pillColor.value
}

const mg=buildMediaGateway()
if(mg){
merged.mediaGateway=mg
}

const result=await ghPutFile(
token,
TARGET_PATH,
meta.sha,
toBase64Utf8(JSON.stringify(merged,null,2)),
"BASE publish"
)

if(result?.content?.sha){
el.lastSha.textContent=`sha: ${result.content.sha}`
}

setPill("ok","STATUS: published")
log("Publish success.")

}catch(e){

setPill("bad","STATUS: publish failed")
log(e.message)

}finally{

setPublishBusy(false)

}

}

el.token.addEventListener("input",()=>{
const t=(el.token.value||"").trim()

if(t){
localStorage.setItem(LS_TOKEN,t)
}else{
localStorage.removeItem(LS_TOKEN)
}

enablePublishIfReady()
})

el.btnResetToken.addEventListener("click",()=>{
localStorage.removeItem(LS_TOKEN)
el.token.value=""
hasLoadedState=false
setPublishBusy(false)
el.lastSha.textContent="sha: —"
setPill("warn","STATUS: ready")
log("Creator key reset.")
refreshPreview()
})

el.name.addEventListener("input",enablePublishIfReady)
el.bio.addEventListener("input",enablePublishIfReady)
el.backgroundColor.addEventListener("input",enablePublishIfReady)
el.pillColor.addEventListener("input",enablePublishIfReady)

el.mediaEnabled.addEventListener("change",()=>{
mediaTouched=true
enablePublishIfReady()
})

el.mediaCollectionTitle.addEventListener("input",()=>{
mediaTouched=true
enablePublishIfReady()
})

el.previewFrame.addEventListener("load",()=>{
refreshPreview()
})

function init(){

el.repoLabel.textContent=`${OWNER}/${REPO}@${BRANCH}`
el.contentUrl.value=DEFAULT_CONTENT_URL

const saved=(localStorage.getItem(LS_TOKEN)||"").trim()
if(saved){
el.token.value=saved
localStorage.setItem(LS_TOKEN,saved)
}else{
localStorage.removeItem(LS_TOKEN)
}

renderLinks()
renderMediaList()
setPublishBusy(false)
refreshPreview()

}

init()

</script>

</body>
</html>
