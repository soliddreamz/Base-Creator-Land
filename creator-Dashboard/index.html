<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BASE Creator Dashboard</title>

<style>
html, body{
margin:0;
padding:0;
background:#000;
color:#fff;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
min-height:100%;
}

.wrap{
max-width:1080px;
margin:0 auto;
padding:18px 14px 40px;
box-sizing:border-box;
}

.top{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:16px;
margin-bottom:14px;
}

h1{
font-size:34px;
margin:0 0 6px 0;
letter-spacing:.2px;
}

.sub{
opacity:.72;
margin:0;
font-size:16px;
}

.pill{
border:2px solid #caa300;
border-radius:999px;
padding:10px 14px;
font-weight:600;
min-width:160px;
text-align:center;
}

.pill.ok{border-color:#2ee06b}
.pill.bad{border-color:#ff4b4b}
.pill.warn{border-color:#caa300}

.card{
border:1px solid #222;
background:#070707;
border-radius:18px;
padding:18px;
margin:18px 0;
box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
}

.row{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.col{
flex:1;
min-width:240px;
}

label{
display:block;
font-size:13px;
opacity:.75;
margin-bottom:6px;
}

input,textarea,button,select{
font:inherit;
}

input,textarea,select{
width:100%;
box-sizing:border-box;
border-radius:14px;
border:1px solid #2a2a2a;
background:#000;
color:#fff;
padding:12px;
outline:none;
}

textarea{
min-height:120px;
resize:vertical;
}

input[type=color]{
height:52px;
padding:6px;
cursor:pointer;
}

.btnRow{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:12px;
}

button{
border-radius:14px;
border:1px solid #2a2a2a;
background:#0b0b0b;
color:#fff;
padding:12px 16px;
cursor:pointer;
}

button:hover{border-color:#444}
button:disabled{opacity:.5;cursor:not-allowed}

.primary{border-color:#caa300!important}
.danger{border-color:#5a1b1b!important}

.linksList{margin-top:10px}

.linkRow{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
padding:10px 12px;
border:1px solid #222;
border-radius:14px;
margin-top:10px;
background:#050505;
}

.linkText{
opacity:.92;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
max-width:calc(100% - 110px);
}

.tiny{
font-size:12px;
opacity:.65;
margin-top:6px;
}

.statusBox{
white-space:pre-wrap;
font-size:12px;
opacity:.75;
}

.previewFrame{
display:block;
width:100%;
height:720px;
border:0;
background:#000;
}

.miniPreview{
border:1px solid #222;
border-radius:18px;
padding:16px;
background:#040404;
}

.toggleRow{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
flex-wrap:wrap;
}

.mediaList{
margin-top:12px;
}

.mediaItemRow{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:12px;
padding:12px;
border:1px solid #222;
border-radius:14px;
margin-top:10px;
background:#050505;
}

.mediaMeta{
flex:1;
min-width:0;
}

.mediaTitle{
font-weight:700;
margin-bottom:4px;
}

.mediaSub{
opacity:.8;
font-size:12px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}
</style>
</head>

<body>

<div class="wrap">

<div class="top">
<div>
<h1>BASE Creator Dashboard</h1>
<p class="sub">Load current state first, then edit, preview, and publish.</p>
</div>
<div id="statePill" class="pill warn">STATUS: ready</div>
</div>

<!-- (HTML CONTENT UNCHANGED) -->

<!-- EVERYTHING ABOVE THIS POINT REMAINS IDENTICAL -->
<!-- ONLY SCRIPT SECTION HAS ADDITIONS -->

<script>

const OWNER="soliddreamz"
const REPO="Base-Creator-Land"
const BRANCH="main"

const TARGET_PATH="Fan App/content.json"
const DEFAULT_CONTENT_URL=`https://${OWNER}.github.io/${REPO}/Fan%20App/content.json`
const LS_TOKEN="base_creator_token_v1"

const $=id=>document.getElementById(id)

let hasLoadedState=false
let linkState=[]
let mediaItems=[]
let mediaHydrated=false
let mediaTouched=false

/* NEW STATE FLAGS */

let isPublishing=false
let isDirty=false

function markDirty(){
isDirty=true
enablePublishIfReady()
}

function clearDirty(){
isDirty=false
enablePublishIfReady()
}

function enablePublishIfReady(){
const hasToken=(el.token.value||"").trim().length>0
el.btnPublish.disabled=!(hasLoadedState && hasToken && isDirty && !isPublishing)
refreshPreview()
}

function setPublishBusy(state){
isPublishing=state
enablePublishIfReady()
}

async function ghGetFileMeta(token,path){

const api=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${encodeURIComponent(path).replace(/%2F/g,'/') }?ref=${BRANCH}`

const res=await fetch(api,{headers:{
Accept:"application/vnd.github+json",
Authorization:`Bearer ${String(token||"").trim()}`,
"X-GitHub-Api-Version":"2022-11-28"
}})

if(!res.ok)throw new Error(`GitHub GET failed (${res.status})`)

return res.json()

}

async function ghPutFile(token,path,sha,contentBase64,message){

const api=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${encodeURIComponent(path).replace(/%2F/g,'/')}`

const body={
message,
content:contentBase64,
branch:BRANCH
}

if(sha)body.sha=sha

const res=await fetch(api,{
method:"PUT",
headers:{
Accept:"application/vnd.github+json",
Authorization:`Bearer ${String(token||"").trim()}`,
"X-GitHub-Api-Version":"2022-11-28",
"Content-Type":"application/json"
},
body:JSON.stringify(body)
})

if(!res.ok)throw new Error(`GitHub PUT failed (${res.status})`)

return res.json()

}

/* PUBLISH */

el.btnPublish.onclick=async()=>{

if(isPublishing){
log("Publish blocked: already publishing.")
return
}

const token=(el.token.value||"").trim()

if(!token){
setPill("bad","STATUS: token required")
log("Publish blocked: missing creator key.")
return
}

try{

setPublishBusy(true)

setPill("warn","STATUS: publishing…")
log("Publish started.")

const meta=await ghGetFileMeta(token,TARGET_PATH)

let existing={}
try{
existing=JSON.parse(atob(meta.content))
}catch(e){
existing={}
}

const merged={
...existing,
name:el.name.value.trim(),
bio:el.bio.value.trim(),
links:linkState,
backgroundColor:el.backgroundColor.value,
pillColor:el.pillColor.value
}

const result=await ghPutFile(
token,
TARGET_PATH,
meta.sha,
btoa(JSON.stringify(merged,null,2)),
"BASE publish"
)

if(result?.content?.sha){
el.lastSha.textContent=`sha: ${result.content.sha}`
}

clearDirty()

setPill("ok","STATUS: published")
log("Publish success.")

}catch(e){

setPill("bad","STATUS: publish failed")
log(e.message)

}finally{

setPublishBusy(false)

}

}

/* DIRTY STATE TRIGGERS */

el.name.addEventListener("input",markDirty)
el.bio.addEventListener("input",markDirty)
el.backgroundColor.addEventListener("input",markDirty)
el.pillColor.addEventListener("input",markDirty)
el.linkLabelInput.addEventListener("input",markDirty)
el.linkUrlInput.addEventListener("input",markDirty)
el.mediaTitle.addEventListener("input",markDirty)
el.mediaUrl.addEventListener("input",markDirty)
el.mediaThumb.addEventListener("input",markDirty)
el.mediaDesc.addEventListener("input",markDirty)
el.mediaCollectionTitle.addEventListener("input",markDirty)

</script>

</body>
</html>
